<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta property="og:image" content="https://example.com/product.jpg">
  <title>Controlled Product Sample</title>
</head>

<body>
  <main>
    <h1 class="product-name">White Regular Fit Essential Crew Neck T-Shirt</h1>

    <div class="brand">Next</div>

    <div class="product-code">369510</div>

    <div class="current-price">£8.00</div>

    <div class="colour">White</div>

    <select class="sizes">
      <option>S</option>
      <option>M</option>
      <option>L</option>
    </select>

    <div class="stock-status">In Stock</div>
  </main>
</body>
</html>
